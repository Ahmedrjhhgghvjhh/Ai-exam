        Output best results
      </div>
    </div>
  `;

  // دوال العرض
  function renderMCQ() {
    const container = document.getElementById('mcq-container');
    container.innerHTML = '';
    mcqData.forEach((q, idx) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `mcq-card-${idx}`;
      card.innerHTML = `
        <div class="question-text">${idx+1}. ${q.text}</div>
        <div class="options" id="mcq-opt-${idx}"></div>
        <div class="feedback" id="mcq-fb-${idx}"></div>
      `;
      container.appendChild(card);
      const optDiv = document.getElementById(`mcq-opt-${idx}`);
      q.options.forEach((opt, optIdx) => {
        const label = document.createElement('span');
        label.className = 'option-label';
        label.innerText = opt;
        label.onclick = () => {
          const allLabels = optDiv.querySelectorAll('.option-label');
          allLabels.forEach(l => l.classList.remove('selected'));
          label.classList.add('selected');
          const isCorrect = (optIdx === q.correct);
          const fbDiv = document.getElementById(`mcq-fb-${idx}`);
          fbDiv.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
          fbDiv.innerText = isCorrect ? '✔️ إجابة صحيحة' : `❌ الإجابة الصحيحة: ${q.options[q.correct]}`;
        };
        optDiv.appendChild(label);
      });
    });
  }

  function renderTF() {
    const container = document.getElementById('tf-container');
    container.innerHTML = '';
    tfQuestions.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="question-text">${idx+1}. ${item.text}</div>
        <div class="tf-buttons" id="tf-btns-${idx}">
          <button data-val="true" class="tf-btn">✓ صواب</button>
          <button data-val="false" class="tf-btn">✗ خطأ</button>
        </div>
        <div class="feedback" id="tf-fb-${idx}"></div>
      `;
      container.appendChild(card);
      const btnContainer = document.getElementById(`tf-btns-${idx}`);
      const fbSpan = document.getElementById(`tf-fb-${idx}`);
      const trueBtn = btnContainer.children[0];
      const falseBtn = btnContainer.children[1];
      const setResult = (selectedBool) => {
        const isCorrect = (selectedBool === item.correct);
        fbSpan.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
        fbSpan.innerText = isCorrect ? '✅ إجابة صحيحة' : `❌ خطأ، الإجابة الصحيحة: ${item.correct ? 'صواب ✓' : 'خطأ ✗'}`;
        if(selectedBool === true) { trueBtn.classList.add('active-true'); falseBtn.classList.remove('active-false'); }
        else { falseBtn.classList.add('active-false'); trueBtn.classList.remove('active-true'); }
      };
      trueBtn.onclick = () => setResult(true);
      falseBtn.onclick = () => setResult(false);
    });
  }

  function renderEssay() {
    const container = document.getElementById('essay-container');
    container.innerHTML = essayContent;
  }

  function initTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.getAttribute('data-tab');
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        panes.forEach(pane => pane.classList.remove('active-pane'));
        document.getElementById(tabId).classList.add('active-pane');
      });
    });
  }

  renderMCQ();
  renderTF();
  renderEssay();
  initTabs();
</script>
</body>
</html>
